<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Storytelling App</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="./script.js" defer></script>
</head>

<body>
    <h1>Login</h1>
    <main class="container">
        <div class="btn-container">
            <form id="Login-form">
            <input type="text" name="login-username" placeholder="Username">
            <input type="text" name="login-email" placeholder="Email">
            <input type="password" name="login-password" placeholder="Password">
            
                <button class = "btn" type="Submit" id = "Login-btn">Submit</button>

            </form>
        </div>
     
    </main>
    <h1>Create Account</h1>
    <main class="container">
        <div class = "btn-container">
        <form id = "createAccount-form">
        <input type="text" id = "Name" placeholder="Name">
        <input type="text" id = "Username" placeholder="Username">
        <input type="text" id = "Email" placeholder="Email">
        <input type="text" id = "DOB" placeholder="DOB">
        <input type="text" id = "Password" placeholder="Password">
        
            <button class = "btn" type = "Submit" id = "createAccount-btn">Submit</button>
        
        </form>
        </div>

   
</body>

</html>
