<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Editor</title>
    <link rel="stylesheet" href="newFile.css">
    <script src="newFile.js" defer></script>
</head>
<body>

    <main class="document">
        <input type="text" placeholder="Title" class="title-input">

        <textarea placeholder="Write your note here..." class="content-input"></textarea>

        <div id="media-preview"></div>

        <div class="buttons">
            <label class="upload-btn"> Attach, max 1 file.
                <input type="file" id="file-input" accept="image/*,.pdf,.docx" hidden>
            </label>
            <span id="file-name"></span>
            <button id="save-btn">Post</button>
            <a href="homepage.html"><button id="home-btn">Home</button></a>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
